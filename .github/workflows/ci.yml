name: ci

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Unit tests
        run: python3 -m unittest discover -s tests -v

      - name: Smoke — clean fixture must pass the gate
        run: python3 -m agentscan fixtures/clean --fail-on HIGH

      - name: Smoke — malicious fixture must be caught (expect non-zero)
        run: |
          if python3 -m agentscan fixtures/malicious --fail-on HIGH; then
            echo "::error::scanner failed to flag the malicious fixture"; exit 1
          else
            echo "malicious fixture correctly flagged"
          fi
